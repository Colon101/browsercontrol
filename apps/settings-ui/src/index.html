<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserControl Debug</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111d;
        --panel: rgba(20, 32, 48, 0.92);
        --border: rgba(136, 168, 214, 0.18);
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.64);
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(83, 228, 199, 0.16), transparent 30%),
          radial-gradient(circle at top right, rgba(134, 183, 255, 0.22), transparent 32%),
          var(--bg);
        color: var(--text);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BrowserControl</h1>
      <p>Local debug surface for the agent and extension link.</p>
      <div class="panel">
        <h2>Agent State</h2>
        <pre id="state">Loading…</pre>
      </div>
    </main>
    <script>
      async function refresh() {
        const response = await fetch("/api/state");
        const data = await response.json();
        document.getElementById("state").textContent = JSON.stringify(data, null, 2);
      }

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
  </html>
